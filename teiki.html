<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>定期公演 | ふるさと音楽会</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Noto+Serif+JP:wght@200;300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />

  <style>
    /* ===== CSS Variables ===== */
    :root {
      --bg:          #faf8f4;
      --bg-alt:      #f2ede4;
      --ink:         #1c1610;
      --ink-muted:   #5a4f42;
      --gold:        #b89a5a;
      --gold-light:  #d4bc82;
      --gold-pale:   #ede3cc;
      --line:        rgba(184,154,90,0.30);
      --radius:      2px;
      --ff-serif:    'Noto Serif JP', 'YuMincho', serif;
      --ff-latin:    'Cormorant Garamond', 'Georgia', serif;
      --transition:  0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: var(--ff-serif);
      background: var(--bg);
      color: var(--ink);
      line-height: 1.9;
      overflow-x: hidden;
    }

    /* ===== Nav（サブページ用：常時表示） ===== */
    #main-nav {
      transform: translateY(0) !important;
      background: rgba(255,255,255,0.97) !important;
      border-bottom: 1px solid rgba(0,0,0,0.08) !important;
      box-shadow: 0 6px 24px rgba(0,0,0,0.08) !important;
    }
    #main-nav .nav-logo-text  { color: var(--primary) !important; }
    #main-nav .nav-links a    { color: var(--text) !important; }
    #main-nav .nav-links a:hover { color: var(--accent) !important; }
    #main-nav .hamburger span { background: var(--primary) !important; }

    /* ===== Page Header ===== */
    .page-header {
      position: relative;
      padding: calc(68px + 40px) 24px 64px;
      text-align: center;
      overflow: hidden;
    }
    .page-header::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 60% 50% at 50% 0%, rgba(184,154,90,0.10) 0%, transparent 70%);
      pointer-events: none;
    }
    .page-header__deco {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      font-family: var(--ff-latin);
      font-size: clamp(80px, 18vw, 200px);
      font-style: italic;
      font-weight: 300;
      color: transparent;
      -webkit-text-stroke: 1px rgba(184,154,90,0.10);
      letter-spacing: 0.05em;
      white-space: nowrap;
      pointer-events: none;
      user-select: none;
    }
    .page-header__label {
      font-family: var(--ff-latin);
      font-size: 11px;
      letter-spacing: 0.30em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 16px;
      position: relative;
    }
    .page-header__title {
      font-size: clamp(28px, 5vw, 48px);
      font-weight: 300;
      letter-spacing: 0.20em;
      line-height: 1.4;
      position: relative;
      color: var(--ink);
    }
    .page-header__rule {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin: 24px auto 0;
      width: fit-content;
    }
    .page-header__rule::before,
    .page-header__rule::after {
      content: '';
      display: block;
      width: 48px;
      height: 1px;
      background: var(--gold);
      opacity: 0.6;
    }
    .page-header__rule-icon {
      width: 6px; height: 6px;
      border: 1px solid var(--gold);
      transform: rotate(45deg);
    }

    /* ===== Section Wrapper ===== */
    .section {
      max-width: 960px;
      margin: 0 auto;
      padding: 0 24px 100px;
    }

    /* ===== Timeline ===== */
    .timeline {
      position: relative;
      padding-top: 20px;
    }
    .timeline::before {
      content: '';
      position: absolute;
      top: 0; bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 1px;
      background: linear-gradient(to bottom, transparent, var(--gold-light) 5%, var(--gold-light) 95%, transparent);
    }

    /* ===== Concert Card ===== */
    .concert {
      display: grid;
      grid-template-columns: 1fr 60px 1fr;
      align-items: start;
      margin-bottom: 72px;
      opacity: 0;
      transform: translateY(24px);
      transition: opacity 0.7s ease, transform 0.7s ease;
    }
    .concert.visible { opacity: 1; transform: translateY(0); }

    .concert--odd  .concert__content { grid-column: 3; grid-row: 1; }
    .concert--odd  .concert__center  { grid-column: 2; grid-row: 1; }
    .concert--odd  .concert__image   { grid-column: 1; grid-row: 1; justify-self: end; }
    .concert--even .concert__content { grid-column: 1; grid-row: 1; }
    .concert--even .concert__center  { grid-column: 2; grid-row: 1; }
    .concert--even .concert__image   { grid-column: 3; grid-row: 1; justify-self: start; }

    .concert__center {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 28px;
    }
    .concert__node {
      width: 14px; height: 14px;
      border: 2px solid var(--gold);
      background: var(--bg);
      border-radius: 50%;
      flex-shrink: 0;
      box-shadow: 0 0 0 4px rgba(184,154,90,0.12);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    .concert:hover .concert__node {
      transform: scale(1.3);
      box-shadow: 0 0 0 6px rgba(184,154,90,0.18);
    }

    .concert__content {
      padding: 24px 28px;
      background: white;
      border: 1px solid rgba(184,154,90,0.18);
      border-radius: var(--radius);
      box-shadow: 0 2px 20px rgba(28,22,16,0.04);
      transition: box-shadow var(--transition), transform var(--transition);
      max-width: 400px;
    }
    .concert--odd  .concert__content { margin-left: 4px; }
    .concert--even .concert__content { margin-right: 4px; }
    .concert:hover .concert__content {
      box-shadow: 0 6px 32px rgba(28,22,16,0.09);
      transform: translateY(-2px);
    }

    .concert__num {
      font-family: var(--ff-latin);
      font-size: 12px;
      letter-spacing: 0.25em;
      color: var(--gold);
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .concert__title {
      font-size: 18px;
      font-weight: 400;
      letter-spacing: 0.12em;
      line-height: 1.5;
      margin-bottom: 14px;
      color: var(--ink);
    }
    .concert__divider {
      width: 32px; height: 1px;
      background: var(--gold);
      opacity: 0.5;
      margin-bottom: 14px;
    }
    .concert__meta {
      font-size: 13px;
      color: var(--ink-muted);
      letter-spacing: 0.05em;
      line-height: 1.85;
    }
    .concert__date {
      display: flex;
      align-items: baseline;
      gap: 8px;
      margin-bottom: 4px;
    }
    .concert__date-icon,
    .concert__venue-icon {
      font-size: 10px;
      color: var(--gold);
      flex-shrink: 0;
    }
    .concert__venue-icon { margin-top: 4px; }
    .concert__venue {
      display: flex;
      align-items: flex-start;
      gap: 8px;
    }

    .concert__image {
      width: clamp(160px, 22vw, 240px);
      overflow: hidden;
      border-radius: var(--radius);
      box-shadow: 4px 8px 28px rgba(28,22,16,0.10);
      margin-top: 20px;
      flex-shrink: 0;
    }
    .concert--odd  .concert__image { margin-right: 4px; }
    .concert--even .concert__image { margin-left: 4px; }
    .concert__image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.6s ease;
      aspect-ratio: 3/4;
    }
    .concert:hover .concert__image img { transform: scale(1.04); }

    .latest-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--gold-pale);
      border: 1px solid var(--gold-light);
      border-radius: 2px;
      padding: 4px 14px;
      font-size: 11px;
      letter-spacing: 0.20em;
      color: var(--gold);
      margin-bottom: 6px;
    }

    /* ===== Loading / Error state ===== */
    .timeline-message {
      text-align: center;
      padding: 60px 24px;
      color: var(--ink-muted);
      font-size: 14px;
      letter-spacing: 0.08em;
    }

    /* ===== Mobile ===== */
    @media (max-width: 680px) {
      .timeline::before { left: 20px; }
      .concert {
        display: block;
        padding-left: 48px;
        position: relative;
        margin-bottom: 52px;
      }
      .concert__center {
        position: absolute;
        left: 14px; top: 28px;
        padding-top: 0;
      }
      .concert__content {
        max-width: 100%;
        margin: 0 !important;
        padding: 18px 20px;
      }
      .concert__image {
        width: 100%;
        margin: 16px 0 0 !important;
      }
      .concert__image img { aspect-ratio: 4/3; }
    }
  </style>
</head>
